name: Quality gate

# Обязательные проверки на каждый PR в main: линт, формат, типы, тесты.
# Падение любого шага блокирует merge (см. branch protection в README).

on:
  pull_request:
    branches: [main]
  # Позволяет прогнать gate на самом main после merge (для истории/бейджа).
  push:
    branches: [main]

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: ruff · mypy · pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check --output-format=github .

      - name: Ruff format
        run: ruff format --check .

      - name: Mypy
        run: mypy

      - name: Pytest (with coverage)
        run: pytest --cov=trading_research --cov-report=term-missing --cov-report=xml
